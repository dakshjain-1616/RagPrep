<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="500" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">RAGPrep Pipeline Architecture</text>
  <line x1="60" y1="50" x2="840" y2="50" stroke="#ccc" stroke-width="1"/>

  <!-- ===== TOP ROW: Entry Points ===== -->
  <!-- CLI box -->
  <rect x="60" y="70" width="140" height="56" rx="8" fill="#A23B72"/>
  <text x="130" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">CLI</text>
  <text x="130" y="113" text-anchor="middle" font-size="11" fill="#f9d4eb">ragprep ingest / query</text>

  <!-- FastAPI box -->
  <rect x="240" y="70" width="140" height="56" rx="8" fill="#A23B72"/>
  <text x="310" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">FastAPI Server</text>
  <text x="310" y="113" text-anchor="middle" font-size="11" fill="#f9d4eb">POST /v1/search</text>

  <!-- Entry point label -->
  <text x="170" y="148" text-anchor="middle" font-size="11" fill="#666" font-style="italic">Entry Points</text>

  <!-- Arrow: CLI → Ingest Pipeline -->
  <line x1="130" y1="126" x2="130" y2="185" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: FastAPI → Query Engine (down and right) -->
  <line x1="310" y1="126" x2="310" y2="165" stroke="#333" stroke-width="1.5"/>
  <line x1="310" y1="165" x2="660" y2="165" stroke="#333" stroke-width="1.5"/>
  <line x1="660" y1="165" x2="660" y2="305" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Ingest trigger label on CLI arrow -->
  <text x="145" y="160" font-size="10" fill="#555">ingest</text>

  <!-- ===== PIPELINE ROW ===== -->
  <!-- Source Files box -->
  <rect x="60" y="190" width="140" height="70" rx="8" fill="#2E86AB"/>
  <text x="130" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Source Files</text>
  <text x="130" y="232" text-anchor="middle" font-size="11" fill="#cee7f2">PDF · DOCX · PPTX</text>
  <text x="130" y="248" text-anchor="middle" font-size="11" fill="#cee7f2">XLSX · Images · Audio</text>

  <!-- Arrow: Source → Converter -->
  <line x1="200" y1="225" x2="247" y2="225" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Converter box -->
  <rect x="250" y="190" width="140" height="70" rx="8" fill="#A23B72"/>
  <text x="320" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Converter</text>
  <text x="320" y="232" text-anchor="middle" font-size="11" fill="#f9d4eb">microsoft/</text>
  <text x="320" y="248" text-anchor="middle" font-size="11" fill="#f9d4eb">markitdown</text>

  <!-- Arrow: Converter → Markdown Text -->
  <line x1="390" y1="225" x2="437" y2="225" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Markdown Text box -->
  <rect x="440" y="190" width="130" height="70" rx="8" fill="#2E86AB"/>
  <text x="505" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Markdown</text>
  <text x="505" y="232" text-anchor="middle" font-size="11" fill="#cee7f2">Clean text</text>
  <text x="505" y="248" text-anchor="middle" font-size="11" fill="#cee7f2">with structure</text>

  <!-- Arrow: Markdown → Chunker -->
  <line x1="570" y1="225" x2="617" y2="225" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Chunker box -->
  <rect x="620" y="190" width="155" height="70" rx="8" fill="#A23B72"/>
  <text x="697" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Chunker</text>
  <text x="697" y="227" text-anchor="middle" font-size="11" fill="#f9d4eb">Heading-aware</text>
  <text x="697" y="243" text-anchor="middle" font-size="11" fill="#f9d4eb">Table-preserving</text>
  <text x="697" y="259" text-anchor="middle" font-size="10" fill="#f9d4eb">Sliding window overlap</text>

  <!-- Arrow: Chunker → Storage (down) -->
  <line x1="697" y1="260" x2="697" y2="307" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== STORAGE ROW ===== -->
  <!-- Hash Tracker (SQLite) -->
  <rect x="440" y="310" width="170" height="70" rx="8" fill="#F18F01"/>
  <text x="525" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Hash Tracker</text>
  <text x="525" y="352" text-anchor="middle" font-size="11" fill="#fff5e0">SQLite database</text>
  <text x="525" y="368" text-anchor="middle" font-size="11" fill="#fff5e0">Incremental updates</text>

  <!-- ChromaDB -->
  <rect x="640" y="310" width="160" height="70" rx="8" fill="#F18F01"/>
  <text x="720" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">ChromaDB</text>
  <text x="720" y="352" text-anchor="middle" font-size="11" fill="#fff5e0">Vector store</text>
  <text x="720" y="368" text-anchor="middle" font-size="11" fill="#fff5e0">Cosine similarity</text>

  <!-- Arrow: Chunker → Hash Tracker -->
  <line x1="697" y1="310" x2="620" y2="345" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== EMBEDDING MODEL ===== -->
  <rect x="440" y="420" width="360" height="55" rx="8" fill="#A23B72"/>
  <text x="620" y="444" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Embedding Model (sentence-transformers)</text>
  <text x="620" y="462" text-anchor="middle" font-size="11" fill="#f9d4eb">all-MiniLM-L6-v2  ·  Local inference  ·  384 dimensions</text>

  <!-- Arrow: Embedding → ChromaDB -->
  <line x1="720" y1="420" x2="720" y2="380" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow: Chunker → Embedding -->
  <line x1="697" y1="260" x2="697" y2="280" stroke="none"/>
  <line x1="640" y1="440" x2="617" y2="380" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDash)"/>

  <!-- ===== QUERY ENGINE (bottom left) ===== -->
  <rect x="60" y="310" width="155" height="70" rx="8" fill="#A23B72"/>
  <text x="137" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Query Engine</text>
  <text x="137" y="352" text-anchor="middle" font-size="11" fill="#f9d4eb">Similarity search</text>
  <text x="137" y="368" text-anchor="middle" font-size="11" fill="#f9d4eb">Score threshold</text>

  <!-- Arrow: Query Engine → ChromaDB (reads) -->
  <line x1="215" y1="345" x2="437" y2="345" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDash)"/>
  <text x="325" y="335" text-anchor="middle" font-size="10" fill="#666">query vectors</text>

  <!-- Arrow: CLI → Query Engine (query path) -->
  <line x1="130" y1="126" x2="130" y2="190" stroke="none"/>
  <line x1="92" y1="126" x2="92" y2="310" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDash)"/>
  <text x="72" y="225" text-anchor="middle" font-size="10" fill="#666" transform="rotate(-90,72,225)">query</text>

  <!-- ===== LEGEND ===== -->
  <rect x="60" y="420" width="340" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="230" y="438" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Legend</text>
  <!-- Blue swatch -->
  <rect x="72" y="445" width="14" height="14" rx="2" fill="#2E86AB"/>
  <text x="92" y="456" font-size="11" fill="#333">Data / Text</text>
  <!-- Purple swatch -->
  <rect x="162" y="445" width="14" height="14" rx="2" fill="#A23B72"/>
  <text x="182" y="456" font-size="11" fill="#333">Processing</text>
  <!-- Orange swatch -->
  <rect x="258" y="445" width="14" height="14" rx="2" fill="#F18F01"/>
  <text x="278" y="456" font-size="11" fill="#333">Storage</text>
  <!-- Solid arrow legend -->
  <line x1="72" y1="468" x2="100" y2="468" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="107" y="472" font-size="11" fill="#333">Ingest flow</text>
  <!-- Dashed arrow legend -->
  <line x1="193" y1="468" x2="221" y2="468" stroke="#333" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowDash)"/>
  <text x="228" y="472" font-size="11" fill="#333">Query flow</text>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="arrowDash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
